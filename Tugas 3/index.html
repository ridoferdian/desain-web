<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabel</title>
    <style>
      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border: 1px solid black;
        padding: 8px;
        text-align: left;
      }

      th {
        background-color: #f2f2f2;
      }
    </style>
  </head>
  <body>
    <section>
      <table>
        <tr>
          <th>Nama</th>
          <th>NIM</th>
          <th>Jurusan</th>
        </tr>
        <tr>
          <td>Rido Ferdian Krisna</td>
          <td>1125102203</td>
          <td>Teknik Informatika</td>
        </tr>
      </table>
    </section>
  </body>
</html>
